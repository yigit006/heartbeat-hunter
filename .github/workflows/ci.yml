name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Bagimliliklari kur
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Testler (pytest)
        run: pytest -v
