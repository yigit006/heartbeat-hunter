name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # requires-python >=3.10 iddiasi en eski surumde de test edilmeli
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Bagimliliklari kur
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Testler (pytest)
        run: pytest -v
